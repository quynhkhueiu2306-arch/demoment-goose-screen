<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Moment 鹅鸭杀 - 现场大屏幕</title>
    
<script src="https://cdn.jsdelivr.net/npm/@cloudbase/js-sdk@2.8.2/cloudbase.full.js"></script>

    <style>
        /* ====== 欢快大屏视觉视觉方案 ====== */
        :root {
            --bg-main: #87CEEB; 
            --accent-orange: #FF7043;
            --alive-green: #8BC34A;
            --dead-gray: #B0BEC5;
            --panel-white: rgba(255, 255, 255, 0.95);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-main) radial-gradient(circle at center, #E1F5FE 0%, #81D4FA 100%);
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #333;
        }

        /* 顶部标题 */
        .header-title {
            text-align: center;
            font-size: 4.5rem;
            font-weight: 900;
            color: #FFFFFF;
            margin: 20px 0;
            letter-spacing: 4px;
            text-shadow: 4px 4px 0 var(--accent-orange), 8px 8px 0px rgba(0,0,0,0.1);
        }

        /* 主布局 */
        #dashboard {
            display: grid;
            grid-template-columns: 2.8fr 4fr 2.8fr; 
            flex-grow: 1;
            gap: 25px;
            padding: 0 40px 40px 40px;
            box-sizing: border-box;
        }

        .panel {
            background: var(--panel-white);
            border-radius: 35px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 4px solid #FFF;
        }

        .panel-header {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--accent-orange);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px dashed #FFCC80;
        }

        /* 玩家格子 */
        .player-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .player-cell {
            aspect-ratio: 1/1;
            background: #F5F5F5;
            border: 4px solid #DDD;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 900;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .player-cell.alive {
            background: #F1F8E9;
            border-color: var(--alive-green);
            color: var(--alive-green);
            box-shadow: 0 6px 0 #689F38;
        }

        .player-cell.dead {
            background: #ECEFF1;
            border-color: var(--dead-gray);
            color: var(--dead-gray);
            transform: scale(0.9) translateY(5px);
            opacity: 0.6;
            box-shadow: none;
        }

        /* 中间核心区 */
        .center-panel {
            justify-content: center;
            align-items: center;
            background: #FFFDE7;
            border: 6px solid #FFC107;
        }

        #main-status {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--accent-orange);
            background: #FFF;
            padding: 15px 50px;
            border-radius: 60px;
            box-shadow: 0 8px 0 #FFC107;
            margin-bottom: 30px;
            text-align: center;
        }

        #main-timer {
            font-size: 11rem;
            font-weight: 900;
            color: #333;
            text-shadow: 4px 4px 0 #EEE;
        }

        /* 右侧日志区 */
        .terminal {
            flex-grow: 1;
            background: #263238;
            color: #81C784;
            padding: 20px;
            border-radius: 20px;
            font-family: 'Consolas', monospace;
            font-size: 1.1rem;
            overflow-y: hidden;
            line-height: 1.6;
        }

        .log-item { margin-bottom: 10px; border-left: 4px solid #4CAF50; padding-left: 10px; animation: slideIn 0.3s ease; }
        .log-item.err { border-left-color: #FF5252; color: #FF8A80; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div class="header-title">DeMoment 鹅鸭杀</div>

    <div id="dashboard">
        <div class="panel">
            <div class="panel-header">存活状态监测</div>
            <div id="player-grid" class="player-grid"></div>
        </div>

        <div class="panel center-panel">
            <div id="main-status">系统初始化...</div>
            <div id="main-timer">--:--</div>
        </div>

        <div class="panel">
            <div class="panel-header">现场广播</div>
            <div id="terminal-logs" class="terminal">
                <div class="log-item">正在接入云端环境...</div>
            </div>
        </div>
    </div>

    <script>
        // 配置环境 ID 和 区域（上海）
        const ENV_ID = 'cloud1-3gb8lxcqa6cdfe36';
        let app = null;
        let timerInterval = null;

        // 1. 启动检查
        function bootstrap() {
            const sdk = window.tcb || window.cloudbase;
            if (!sdk) {
                setTimeout(bootstrap, 500);
                return;
            }
            try {
                // 初始化，必须指定上海区域
                app = sdk.init({ 
                    env: ENV_ID,
                    region: 'ap-shanghai' 
                });
                startApp();
            } catch (err) {
                addLog("初始化异常: " + err.message, true);
            }
        }

        // 2. 核心逻辑
        async function startApp() {
            try {
                // 开启本地缓存，防止刷新网页就掉线
                const auth = app.auth({ persistence: 'local' });
                
                // 【关键修复】先检查是不是已经连上了，没连上才去登录
                const loginState = await auth.getLoginState();
                if (!loginState) {
                    await auth.anonymousAuthProvider().signIn();
                }
                
                addLog("✅ 大屏幕成功连接云端服务器");
                document.getElementById('main-status').innerText = "等待数据同步...";

                const db = app.database();

                // 监听游戏状态
                db.collection('game_state').limit(1).watch({
                    onChange: (snapshot) => {
                        if (snapshot.docs.length > 0) {
                            renderGame(snapshot.docs[0]);
                        }
                    },
                    onError: (err) => addLog("数据流异常: " + err.code, true)
                });

                // 监听死亡记录（可选）
                let isFirstLoad = true;
                db.collection('death_records').orderBy('timestamp', 'desc').limit(1).watch({
                    onChange: (snapshot) => {
                        if (isFirstLoad) { isFirstLoad = false; return; }
                        if (snapshot.docs.length > 0) {
                            const d = snapshot.docs[0];
                            addLog(`💀 警报！玩家 [${d.victim}] 变成幽灵了！`);
                        }
                    },
                    onError: (err) => {}
                });

            } catch (err) {
                addLog("❌ 登录失败: " + (err.code || err.message), true);
            }
        }
        // 3. 渲染界面
        function renderGame(data) {
            const statusNames = ["自由探索", "紧急会议", "任务时间", "投票进行中"];
            document.getElementById('main-status').innerText = statusNames[data.status] || "游戏进行中";

            const grid = document.getElementById('player-grid');
            const total = data.total_players || 15;
            // 处理死亡名单字符串，兼容中英文逗号
            const deadList = data.eliminated_players ? String(data.eliminated_players).replace(/，/g, ',').split(',') : [];
            
            grid.innerHTML = '';
            for (let i = 1; i <= total; i++) {
                const cell = document.createElement('div');
                const isDead = deadList.includes(String(i));
                cell.className = `player-cell ${isDead ? 'dead' : 'alive'}`;
                cell.innerText = i < 10 ? '0' + i : i;
                grid.appendChild(cell);
            }

            handleTimer(data.global_timer_end);
        }

        // 4. 计时器
        function handleTimer(endTime) {
            clearInterval(timerInterval);
            if (!endTime || endTime < Date.now()) {
                document.getElementById('main-timer').innerText = "00:00";
                return;
            }
            timerInterval = setInterval(() => {
                const diff = Math.floor((endTime - Date.now()) / 1000);
                if (diff <= 0) {
                    document.getElementById('main-timer').innerText = "00:00";
                    clearInterval(timerInterval);
                } else {
                    const m = Math.floor(diff / 60).toString().padStart(2, '0');
                    const s = (diff % 60).toString().padStart(2, '0');
                    document.getElementById('main-timer').innerText = `${m}:${s}`;
                }
            }, 1000);
        }

        function addLog(msg, isErr = false) {
            const logs = document.getElementById('terminal-logs');
            const item = document.createElement('div');
            item.className = `log-item ${isErr ? 'err' : ''}`;
            item.innerHTML = `> [${new Date().toLocaleTimeString('zh-CN', {hour12:false})}] ${msg}`;
            logs.appendChild(item);
            if (logs.children.length > 12) logs.removeChild(logs.firstChild);
        }

        document.addEventListener('DOMContentLoaded', bootstrap);
    </script>
</body>
</html>
